{% extends "base.html" %}

{% block title %}Reset Password - business2026{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header" style="background: linear-gradient(135deg, #2E7D32, #4FC3F7); color: white;">
                    <h4 class="mb-0"><i class="fas fa-lock me-2"></i>Reset Password</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted mb-4">Please enter your new password below.</p>
                    
                    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
                        <div class="mb-3">
                            <label for="password" class="form-label">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <small class="text-muted">Minimum 6 characters</small>
                        </div>
                        
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">Confirm New Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary" style="background: linear-gradient(135deg, #2E7D32, #4FC3F7); border: none;">
                                <i class="fas fa-save me-2"></i>Reset Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
