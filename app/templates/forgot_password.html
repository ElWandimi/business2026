{% extends "base.html" %}

{% block title %}Forgot Password - business2026{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header" style="background: linear-gradient(135deg, #2E7D32, #4FC3F7); color: white;">
                    <h4 class="mb-0"><i class="fas fa-key me-2"></i>Forgot Password</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted mb-4">Enter your email address and we'll send you instructions to reset your password.</p>
                    
                    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                        <div class="mb-4">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email" required autofocus>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary" style="background: linear-gradient(135deg, #2E7D32, #4FC3F7); border: none;">
                                <i class="fas fa-paper-plane me-2"></i>Send Reset Instructions
                            </button>
                        </div>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="mb-2">Remember your password? <a href="{{ url_for('auth.login') }}" style="color: #2E7D32;">Log in</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
