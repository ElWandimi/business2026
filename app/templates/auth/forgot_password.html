{% extends "base.html" %}

{% block title %}Forgot Password - WandimiMart{% endblock %}

{% block content %}
<div class="container" style="max-width: 400px; margin-top: 50px;">
    <h2 class="text-center mb-4">Forgot Password</h2>
    <p class="text-muted text-center">Enter your email address and we'll send you a link to reset your password.</p>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <button type="submit" class="btn w-100" style="background-color: var(--sky-blue); color: #000;">Send Reset Link</button>
    </form>
    <div class="text-center mt-3">
        <a href="{{ url_for('auth.login') }}">Back to Login</a>
    </div>
</div>
{% endblock %}
