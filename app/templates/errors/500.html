{% extends "base.html" %}

{% block title %}Server Error - business2026{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="error-template mb-5">
                <h1 class="display-1" style="color: var(--sky-blue);">500</h1>
                <h2 class="mb-4">Internal Server Error</h2>
                <div class="error-details mb-4">
                    <p class="lead">Something went wrong on our end. We're working to fix it.</p>
                </div>
                <div class="error-actions">
                    <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg me-3">
                        <i class="fas fa-home me-2"></i>Back to Home
                    </a>
                    <a href="{{ url_for('main.products') }}" class="btn btn-outline-success btn-lg">
                        <i class="fas fa-shopping-bag me-2"></i>Browse Products
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
