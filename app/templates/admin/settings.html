{% extends "admin/base.html" %}

{% block title %}Site Settings - Admin{% endblock %}

{% block page_title %}Site Settings{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="card shadow-sm">
        <div class="card-header" style="background-color: var(--d4f0d4); color: var(--junle-green);">
            <i class="fas fa-cog"></i> General Settings
        </div>
        <div class="card-body">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Site Name</label>
                        <input type="text" name="site_name" class="form-control" value="{{ settings.site_name }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Site URL</label>
                        <input type="url" name="site_url" class="form-control" value="{{ settings.site_url }}" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Admin Email</label>
                        <input type="email" name="admin_email" class="form-control" value="{{ settings.admin_email }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Order Prefix</label>
                        <input type="text" name="order_prefix" class="form-control" value="{{ settings.order_prefix }}">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="form-label">Currency Code</label>
                        <input type="text" name="currency_code" class="form-control" value="{{ settings.currency_code }}" maxlength="3">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Currency Symbol</label>
                        <input type="text" name="currency_symbol" class="form-control" value="{{ settings.currency_symbol }}" maxlength="5">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Tax Rate (%)</label>
                        <input type="number" step="0.01" name="tax_rate" class="form-control" value="{{ settings.tax_rate }}">
                    </div>
                    <div class="col-md-3">
                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" name="tax_included" id="tax_included" {% if settings.tax_included %}checked{% endif %}>
                            <label class="form-check-label" for="tax_included">Tax included in prices</label>
                        </div>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Low Stock Threshold</label>
                        <input type="number" name="low_stock_threshold" class="form-control" value="{{ settings.low_stock_threshold }}">
                    </div>
                    <div class="col-md-6">
                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" name="enable_reviews" id="enable_reviews" {% if settings.enable_reviews %}checked{% endif %}>
                            <label class="form-check-label" for="enable_reviews">Enable Reviews</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="enable_wishlist" id="enable_wishlist" {% if settings.enable_wishlist %}checked{% endif %}>
                            <label class="form-check-label" for="enable_wishlist">Enable Wishlist</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="enable_gift_cards" id="enable_gift_cards" {% if settings.enable_gift_cards %}checked{% endif %}>
                            <label class="form-check-label" for="enable_gift_cards">Enable Gift Cards</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn" style="background-color: var(--sky-blue); color: #000;">Save Settings</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
